project_id = "recruit-tracker"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Local email catcher — password-reset mails land here
[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/reset"]
jwt_expiry = 3600
# Public signup is OFF by design — the admin creates accounts (People page / seed).
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false
